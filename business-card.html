<!--
Instruccions d’impressió:
1) Desa aquest fitxer com a `index.html`.
2) Col·loca el QR a `/assets/qr.png`.
3) Col·loca la foto opcional a `/assets/foto.jpg`.
4) Obre el fitxer al navegador.
5) Imprimeix amb escala al 100% i sense marges.
6) Assegura’t que la mida de paper estigui configurada a 85 × 55 mm.

Notes:
- La targeta està preparada per imprimir-se exactament a mida targeta estàndard.
- Si no vols foto, pots deixar el bloc com està o eliminar-lo.
-->

<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Targeta professional de Deyvin Garcias amb QR al portafoli." />
  <meta name="theme-color" content="#0f172a" />
  <title>Deyvin Garcias | Targeta</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f172a;
      --bg-2: #111c33;
      --panel: rgba(15, 23, 42, 0.94);
      --text: #e5eefb;
      --muted: #93a4bf;
      --accent: #22d3ee;
      --accent-soft: rgba(34, 211, 238, 0.14);
      --line: rgba(148, 163, 184, 0.18);
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0b1220;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      overflow: hidden;
    }

    /* L’àrea visible al navegador és una previsualització de la targeta */
    body {
      display: grid;
      place-items: center;
      padding: 16px;
      background:
        radial-gradient(circle at top left, rgba(34, 211, 238, 0.16), transparent 22%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.16), transparent 24%),
        linear-gradient(180deg, #08101f 0%, #040814 100%);
    }

    .card {
      width: 85mm;
      height: 55mm;
      position: relative;
      overflow: hidden;
      border-radius: 6mm;
      background:
        radial-gradient(circle at top right, rgba(34, 211, 238, 0.18), transparent 24%),
        linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 100%);
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: var(--shadow);
      padding: 5.2mm;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      isolation: isolate;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -1px;
      background:
        linear-gradient(135deg, transparent 0 58%, rgba(34, 211, 238, 0.07) 58% 59%, transparent 59% 100%),
        linear-gradient(180deg, transparent 0 72%, rgba(255,255,255,0.03) 72% 73%, transparent 73% 100%);
      pointer-events: none;
      z-index: -1;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 4mm;
      align-items: flex-start;
    }

    .brand-block {
      min-width: 0;
      flex: 1 1 auto;
    }

    .name {
      margin: 0;
      font-size: 5.1mm;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--accent);
    }

    .title {
      margin: 1.3mm 0 0;
      font-size: 2.55mm;
      line-height: 1.35;
      color: var(--text);
      font-weight: 600;
    }

    .meta {
      margin-top: 1.6mm;
      display: flex;
      gap: 2.4mm;
      flex-wrap: wrap;
      font-size: 2.2mm;
      color: var(--muted);
      line-height: 1.2;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 1.2mm;
      padding: 1.4mm 2.4mm;
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(148, 163, 184, 0.14);
      white-space: nowrap;
    }

    .photo-wrap {
      width: 15mm;
      height: 15mm;
      border-radius: 50%;
      flex: 0 0 auto;
      padding: 0.7mm;
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.35), rgba(59, 130, 246, 0.18));
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .photo {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: #0b1220;
    }

    .photo-fallback {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.14), rgba(255,255,255,0.03));
      color: var(--accent);
      font-size: 4.6mm;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .middle {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4mm;
      align-items: end;
    }

    .links {
      display: grid;
      gap: 1.3mm;
      align-content: end;
      font-size: 2.4mm;
      color: var(--text);
    }

    .link-row {
      display: flex;
      align-items: center;
      gap: 1.8mm;
      min-width: 0;
    }

    .icon {
      width: 3.2mm;
      height: 3.2mm;
      flex: 0 0 auto;
      color: var(--accent);
    }

    .link-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
      opacity: 0.95;
    }

    .link-text small {
      color: var(--muted);
      font-weight: 500;
    }

    .qr-box {
      width: 18mm;
      height: 18mm;
      border-radius: 3.2mm;
      padding: 1.1mm;
      background: #ffffff;
      border: 1px solid rgba(255,255,255,0.1);
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .qr-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .qr-label {
      margin-top: 1.2mm;
      font-size: 1.85mm;
      color: var(--muted);
      text-align: center;
      line-height: 1.2;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 3mm;
      padding-top: 2.8mm;
      border-top: 1px solid var(--line);
    }

    .signature {
      display: grid;
      gap: 0.8mm;
    }

    .location {
      font-size: 2.35mm;
      color: var(--muted);
      line-height: 1.2;
    }

    .tag {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 1.2mm;
      padding: 1.4mm 2.6mm;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid rgba(34, 211, 238, 0.22);
      color: #bff7ff;
      font-size: 2.05mm;
      font-weight: 600;
      line-height: 1;
    }

    .tag::before {
      content: "";
      width: 1.6mm;
      height: 1.6mm;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 1.4mm rgba(34, 211, 238, 0.12);
      flex: 0 0 auto;
    }

    /* Print exact 85 × 55 mm */
    @page {
      size: 85mm 55mm;
      margin: 0;
    }

    @media print {
      html, body {
        width: 85mm;
        height: 55mm;
        padding: 0;
        margin: 0;
        background: white;
      }

      body {
        display: block;
      }

      .card {
        width: 85mm;
        height: 55mm;
        border-radius: 0;
        box-shadow: none;
        margin: 0;
      }
    }

    /* Responsive preview only */
    @media screen and (max-width: 420px) {
      body { padding: 10px; }
      .card {
        transform: scale(0.98);
        transform-origin: center;
      }
    }
  </style>
</head>
<body>
  <main class="card" role="img" aria-label="Targeta professional de Deyvin Garcias">
    <section class="top">
      <div class="brand-block">
        <h1 class="name">Deyvin Garcias</h1>
        <p class="title">Técnico ASIR | Ciberseguridad</p>

        <div class="meta">
          <span class="pill">Reus, Tarragona</span>
          <span class="pill">Portfolio + CV</span>
        </div>
      </div>

      <div class="photo-wrap" aria-label="Foto de perfil opcional">
        <!-- Si vols foto, posa-la a /assets/foto.jpg -->
        <img class="photo" src="/assets/foto.jpg" alt="Foto de Deyvin Garcias" onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';" />
        <div class="photo-fallback">DG</div>
      </div>
    </section>

    <section class="middle">
      <div class="links">
        <div class="link-row">
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 8a5 5 0 0 1 5-5h2a5 5 0 0 1 5 5v8a5 5 0 0 1-5 5h-2a5 5 0 0 1-5-5V8Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M9 9.5h6M9 13h6M9 16.5h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <span class="link-text">linkedin.com/in/deyvin-jose-garcia-morales-1039813b9/</span>
        </div>

        <div class="link-row">
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h11A2.5 2.5 0 0 1 20 7.5v9A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5v-9Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M6.5 8l5.1 4.1c.2.17.5.17.7 0L17.5 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="link-text">deyvingarcias.github.io</span>
        </div>

        <div class="qr-label">Escaneja el codi QR per obrir el portafoli</div>
      </div>

      <div>
        <!-- Posa aquí el teu QR a /assets/qr.png -->
        <div class="qr-box">
          <img src="/assets/qr.png" alt="Codi QR del portafoli" />
        </div>
      </div>
    </section>

    <section class="bottom">
      <div class="signature">
        <div class="location">Portafoli acadèmic i professional</div>
        <div class="tag">Ciberseguretat · Xarxes · Sistemes</div>
      </div>
      <div class="location">Reus · Tarragona</div>
    </section>
  </main>

  <script>
    // No cal cap lògica addicional. La targeta està preparada per imprimir directament.
  </script>
</body>
</html>
